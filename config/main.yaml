defaults:
  - _self_
  - dataset: re10k
  - model: minimal

mode: inspect_dataset
seed: 111123
output_dir: outputs/canonicalgs

wandb:
  project: canonicalgs
  entity: xxy
  mode: online
  id: null
  tags: []

dataset:
  manifest_path: null

objective:
  lambda_rend: 1.0
  lambda_mono: 0.05
  mono_on: true

train:
  bootstrap_steps: 2
  bootstrap_eval_every: 0
  bootstrap_eval_num_scenes: 100
  bootstrap_lr: 0.0001
  debug: false
  log_every: 1
  smoke_steps: 500
  smoke_eval_every: 50
  overfit_steps: 100
  overfit_scene_index: 0
  overfit_train_context_size: 4
  render_train_target_views: 1
  render_eval_target_views: 2
  save_checkpoint: true
  amp: false

runtime:
  device: cuda:7
  conda_env: depthsplat
  remote_host: malab
  remote_root: /data0/xxy/code/CanonicalGS
